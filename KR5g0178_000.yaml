body:
  text: 上清化形隱景登升保仙上經中央黃老君受太微天帝君化形隱景登升玉清上經存八景以運軀思五雲以升形役紫度以招虛䇿炎光以召靈廽三晨以玄注引七斗之元精立用機於寢室積神感於寂庭自無金書東華玄格玉名莫得披看髙帝之篇凡修隱景之道每至八節之日八帝遊會之時也沐浴蘭香清齋幽房入室靜坐臨目存思希微蒼帝君名録豐子建金華太玄寶冠著雲光錦袍帶九暉通光陽霞之符乘八素紫雲一景之輿授我九暉大晨隱符以雲氣覆冠我身身覺隨景而升叩齒二十四通咽氣八過止次存思中微赤帝君諱定光彥建二素寶一之冠著雲光錦袍帶元晨四朗朱碧之符乘七素絳雲二景之輿授我觀雲元晨隱符以雲氣覆冠我身身覺隨景而升因叩齒九通咽氣九過止次存思紫微白帝君諱梁淵石建芙蓉之冠著玄靈錦袍帶總晨皓靈扶希之符乘六素紅雲三景之輿授我總晨九極隱符以雲氣覆冠我身身覺隨景而升因叩齒十一通咽氣六過止次存思玄微黑帝君諱齊元旋建九元寶冠著玄雲錦袍帶沓耀靈真簫鳳之符乘五素青雲四景之輿授我沓耀旋根隱符以雲氣覆冠我身身覺隨景而升因叩齒九通咽氣五過止次存思始微上帝君諱接空子建玄光寶冠著雲光錦袍帶玄景中元八維玉門之符乘四素黃雲五景之輿授我玄景晨平隱符以雲氣覆冠我身身覺隨景而上升因叩齒十二通咽氣四過止次存思靈微中帝君諱康厄文建遠遊冠著緑錦紋袍帶合暉玄霞之符乘三素緑雲六景之輿授我合暉晨命隱符以雲氣覆冠我身身覺隨景上升因叩齒十二道咽氣三過止次存思宣微下帝君諱宏膚子建三寶神冠著單錦文袍帶齊暉保曜靈之符乘二素紫雲七景之輿授我齊暉晨玄隱符以雲氣覆冠我身身覺隨景上升因叩齒九通咽氣二過止次存思洞微真帝君諱泗登攄建飛雲紫華之冠著玄靈錦袍帶元命保形玄暉之符乘一素靈雲八景之輿授我髙上龍煙隱符以雲氣覆冠我身身覺隨景上升叩齒三十六通咽氣一過止次存思九微內帝君諱申明間建紫無三寶之冠著玄雲錦袍帶晨霄八變飛宫之符駕太霞紫煙洞景玉輿來授我髙清太元無極上道君隱符以洞景之輿來迎我身上登玉清之房都畢叩齒三十六通祝曰八景玄煙散氣虛庭蔽身九霞隱景幽冥寶符玄降駕乘緑軿回轉九晨住我身形上登玉房拜謁紫庭畢咽氣三十六過止次存斗第一星帝君變隱桃元內妃名太一法坦字奉正扶著黃錦帔丹青飛裙頽雲髻第二星帝君保胎化形內嬪名太一三瓫字羅朱嬰著青錦帔緑羽飛裙頽雲髻第三星帝君六遁七星上元丹母名太一雲夷字沖雙兆著青錦帔繡羽華裙頽雲髻第四星帝君匿景藏光中元內妃名太一七烈字丘橫嬰著紫錦帔黃華羽裙頽雲髻第五星帝君變體易景斗中大女名太一鬱書字疇丘蘭著朱錦帔紫青飛裙頽雲髻第六星帝君隱迹散象斗中中女名太一氣精字抱定陵著朱錦帔青繡飛裙頽雲髻第七星帝君分景萬形斗中少女名太一都異字天凡淑著丹錦帔青華羽裙頽雲髻第八星帝君化日月水火斗中髙皇左夫人名太一石啓珠字洛茂華著紫錦帔繡羽飛裙頽雲髻第九星帝君化金石山河斗中髙皇右夫人名太一愛條字雲育玄著緑錦帔翠華飛裙頽雲髻存九星帝君隱妃九隂內名形色衣服皆使朗然從北斗中來下炎光流曜煥爛虛無回神玄映入我身中處明堂之內紫房之中夾日月二象九晨之暉羅列相次化為嬰孩九帝真形名曰無常童子安在兆身內外洞徹炎光內發匝體通熱仍叩齒九通祝曰九晨回巔隱化無方洞天九元斗中真童炎光玄映布溢紫房千變萬化易景嬰蒙隨意所之出有入無得乘八景上謁帝皇畢咽氣九過止此帝君九隂化形隱景之上經中央黃老君南方赤精君東方青童君北方太上君西方太素君並回九陰以散形運九晨以匿軀擲飛輪以登空乘玄霄以遨遊縱景萬變隨世沉浮若兆行之三光同休上清化形隱景登升保仙上經
